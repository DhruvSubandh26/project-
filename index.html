<!DOCTYPE html>
<html>
<head>
    <title>Smart Battery Dashboard</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            width: 200px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        /* Battery Bar */
        .battery {
            width: 100%;
            height: 25px;
            border: 2px solid white;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        #battery-fill {
            height: 100%;
            width: 0%;
            background: limegreen;
            transition: width 0.5s;
        }

        /* Graph */
        .graph-container {
            width: 80%;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🔋 Smart Battery Dashboard</h1>

<div class="container">

    <div class="card">
        <h2>Voltage</h2>
        <p id="voltage">--</p>
    </div>

    <div class="card">
        <h2>Current</h2>
        <p id="current">--</p>
    </div>

    <div class="card">
        <h2>Temperature</h2>
        <p id="temperature">--</p>
    </div>

    <div class="card">
        <h2>Battery Level</h2>
        <div class="battery">
            <div id="battery-fill"></div>
        </div>
        <p id="soc">--</p>
    </div>

    <div class="card">
        <h2>Status</h2>
        <p id="prediction">--</p>
    </div>

</div>

<!-- Graph -->
<div class="graph-container">
    <canvas id="voltageChart"></canvas>
</div>

<script>
let voltageData = [];
let labels = [];

const ctx = document.getElementById('voltageChart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Voltage',
            data: voltageData,
            borderWidth: 2
        }]
    },
    options: {
        responsive: true
    }
});

async function fetchData() {
    const res = await fetch('/data');
    const data = await res.json();

    document.getElementById('voltage').innerText = data.voltage + " V";
    document.getElementById('current').innerText = data.current + " A";
    document.getElementById('temperature').innerText = data.temperature + " °C";
    document.getElementById('soc').innerText = data.soc + " %";

    // Battery animation
    document.getElementById('battery-fill').style.width = data.soc + "%";

    // Status color
    const pred = document.getElementById('prediction');
    pred.innerText = data.prediction;

    if (data.prediction === "Healthy") {
        pred.style.color = "lightgreen";
    } else {
        pred.style.color = "red";
    }

    // Graph update
    const time = new Date().toLocaleTimeString();
    labels.push(time);
    voltageData.push(data.voltage);

    if (labels.length > 10) {
        labels.shift();
        voltageData.shift();
    }

    chart.update();
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
