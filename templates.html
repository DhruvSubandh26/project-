<!DOCTYPE html>
<html>
<head>
    <title>Smart Battery Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🔋 Smart Battery Management System</h1>

<div class="container">

    <div class="card">
        <h2>Voltage</h2>
        <p id="voltage">--</p>
    </div>

    <div class="card">
        <h2>Current</h2>
        <p id="current">--</p>
    </div>

    <div class="card">
        <h2>Temperature</h2>
        <p id="temperature">--</p>
    </div>

    <div class="card">
        <h2>SOC</h2>
        <p id="soc">--</p>
    </div>

    <div class="card">
        <h2>Battery Status</h2>
        <p id="prediction">--</p>
    </div>

</div>

<script>
async function fetchData() {
    const response = await fetch('/data');
    const data = await response.json();

    document.getElementById('voltage').innerText = data.voltage + " V";
    document.getElementById('current').innerText = data.current + " A";
    document.getElementById('temperature').innerText = data.temperature + " °C";
    document.getElementById('soc').innerText = data.soc + " %";
    document.getElementById('prediction').innerText = data.prediction;
}

// Refresh every 2 seconds
setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
